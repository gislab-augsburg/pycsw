apiVersion: v1
kind: ConfigMap
metadata:
  name: pycsw-gunicorn-config
data:
  gunicorn_config.py: |
    # gunicorn_config.py
    import os
    
    def on_starting(server):
        # Dieser Hook patcht die Flask-App, bevor sie Anfragen verarbeitet
        from pycsw.wsgi_flask import APP
        
        @APP.after_request
        def add_cors_headers(response):
            response.headers['Access-Control-Allow-Origin'] = '*'
            response.headers['Access-Control-Allow-Methods'] = 'GET, POST, OPTIONS'
            response.headers['Access-Control-Allow-Headers'] = 'Content-Type, Authorization, Origin, Accept'
            return response
    
    bind = "0.0.0.0:8000"
    workers = 2
    timeout = 30
    